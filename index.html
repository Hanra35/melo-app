<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Melo</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --white: #ffffff;
      --dark: #111111;
      --grey: #8e8e93;
      --grey2: #c7c7cc;
      --grey3: #f2f2f7;
      --acc: #7c5cbf;
      --acc2: #a78bfa;
      --player-bg: #1c1c1e;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;background:var(--bg);}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;color:var(--dark);}
    ::-webkit-scrollbar{display:none;}

    /* ══ SCREENS ══ */
    .screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;will-change:transform;}
    .screen.hidden{transform:translateX(100%);pointer-events:none;}
    .screen.slide-left{transform:translateX(-30%);opacity:.6;pointer-events:none;}

    /* ══ HOME ══ */
    #s-home{padding-top:calc(var(--safe-t) + 8px);}
    .home-head{display:flex;align-items:flex-end;justify-content:space-between;padding:10px 22px 4px;}
    .home-title{font-size:32px;font-weight:800;letter-spacing:-.8px;}
    .head-btn{width:38px;height:38px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.08);}
    .home-scroll{flex:1;overflow-y:auto;padding-bottom:calc(80px + var(--safe-b));}

    /* Section header */
    .sec-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 10px;}
    .sec-title{font-size:20px;font-weight:700;letter-spacing:-.3px;}
    .sec-link{font-size:13px;color:var(--acc);font-weight:500;}

    /* Hero banner */
    .hero{margin:8px 22px 0;border-radius:20px;overflow:hidden;height:170px;position:relative;cursor:pointer;}
    .hero-bg{width:100%;height:100%;object-fit:cover;}
    .hero-gradient{position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,92,191,.9) 0%,rgba(167,139,250,.6) 100%);}
    .hero-content{position:absolute;inset:0;padding:20px;display:flex;flex-direction:column;justify-content:flex-end;}
    .hero-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
    .hero-name{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .hero-artist{font-size:13px;color:rgba(255,255,255,.75);margin-top:2px;}
    .hero-play{position:absolute;right:18px;bottom:18px;width:44px;height:44px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.2);}

    /* Playlist cards horizontal */
    .cards-row{display:flex;gap:14px;padding:0 22px;overflow-x:auto;padding-bottom:4px;}
    .pl-card{flex-shrink:0;width:140px;cursor:pointer;}
    .pl-card-art{width:140px;height:140px;border-radius:16px;position:relative;overflow:hidden;margin-bottom:9px;box-shadow:0 4px 14px rgba(0,0,0,.12);}
    .pl-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:100%;height:100%;}
    .pl-card-grid div{width:100%;height:100%;}
    .pl-card-solo{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
    .pl-card-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .pl-card-sub{font-size:11px;color:var(--grey);margin-top:2px;}
    .pl-new-card{flex-shrink:0;width:140px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .pl-new-art{width:140px;height:140px;border-radius:16px;background:var(--grey3);border:2px dashed var(--grey2);display:flex;align-items:center;justify-content:center;margin-bottom:9px;}

    /* Song rows */
    .song-list{padding:0 16px;}
    .song-row{display:flex;align-items:center;gap:12px;padding:8px 6px;border-radius:12px;cursor:pointer;transition:background .1s;}
    .song-row:active{background:rgba(0,0,0,.05);}
    .song-row.active .song-name{color:var(--acc);font-weight:600;}
    .song-art{width:52px;height:52px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;}
    .song-cached{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:#34c759;border:1.5px solid #fff;}
    .song-info{flex:1;min-width:0;}
    .song-name{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .song-artist{font-size:13px;color:var(--grey);margin-top:1px;}
    .song-menu{background:transparent;border:none;cursor:pointer;padding:6px;color:var(--grey2);display:flex;align-items:center;}
    @keyframes b1{0%{height:4px}100%{height:16px}} @keyframes b2{0%{height:12px}100%{height:5px}} @keyframes b3{0%{height:8px}100%{height:14px}}
    .eq{display:flex;gap:2px;align-items:flex-end;height:16px;}
    .eq span{width:3px;border-radius:2px;background:var(--acc);}
    .eq.on span:nth-child(1){animation:b1 .7s ease-in-out infinite alternate;}
    .eq.on span:nth-child(2){animation:b2 .7s ease-in-out infinite alternate .18s;}
    .eq.on span:nth-child(3){animation:b3 .7s ease-in-out infinite alternate .36s;}

    /* ══ MINI PLAYER ══ */
    #mini-player{position:fixed;bottom:calc(var(--safe-b) + 8px);left:12px;right:12px;height:64px;background:var(--player-bg);border-radius:18px;display:flex;align-items:center;padding:0 10px 0 8px;gap:10px;cursor:pointer;z-index:90;box-shadow:0 8px 30px rgba(0,0,0,.25);transform:translateY(100px);opacity:0;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;}
    #mini-player.show{transform:translateY(0);opacity:1;}
    .mp-art{width:46px;height:46px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .mp-info{flex:1;min-width:0;}
    .mp-name{font-size:14px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .mp-artist{font-size:12px;color:rgba(255,255,255,.5);margin-top:1px;}
    .mp-btn{background:transparent;border:none;cursor:pointer;padding:8px;color:#fff;display:flex;align-items:center;}
    .mp-play{background:#fff;border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .1s;}
    .mp-play:active{transform:scale(.92);}
    .mp-prog{position:absolute;bottom:0;left:8px;right:8px;height:2px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
    .mp-prog-fill{height:100%;background:var(--acc2);border-radius:2px;transition:width .1s linear;}

    /* ══ BOTTOM NAV ══ */
    #bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(60px + var(--safe-b));background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,.08);display:flex;align-items:flex-start;padding-top:8px;z-index:80;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:0 4px;background:transparent;border:none;}
    .nav-item svg{transition:transform .15s;}
    .nav-item.active svg{transform:scale(1.05);}
    .nav-label{font-size:10px;font-weight:500;color:var(--grey);}
    .nav-item.active .nav-label{color:var(--acc);}

    /* ══ PLAYER SCREEN ══ */
    #s-player{background:#fff;padding-top:calc(var(--safe-t) + 12px);}
    .player-head{display:flex;align-items:center;justify-content:space-between;padding:0 20px 0;}
    .player-head-title{font-size:13px;font-weight:600;color:var(--grey);letter-spacing:.3px;text-transform:uppercase;}
    .player-close{background:transparent;border:none;cursor:pointer;width:36px;height:36px;border-radius:50%;background:var(--grey3);display:flex;align-items:center;justify-content:center;}
    .player-scroll{flex:1;overflow-y:auto;padding-bottom:calc(20px + var(--safe-b));}
    .player-art-wrap{padding:24px 32px 20px;display:flex;justify-content:center;}
    .player-art{width:100%;max-width:320px;aspect-ratio:1;border-radius:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 20px 60px rgba(0,0,0,.18);position:relative;overflow:hidden;}
    .player-art.pulse{animation:artpulse .6s ease;}
    @keyframes artpulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
    .player-meta{padding:0 28px;display:flex;align-items:flex-start;justify-content:space-between;}
    .player-title{font-size:24px;font-weight:800;letter-spacing:-.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:calc(100% - 50px);}
    .player-artist{font-size:15px;color:var(--grey);margin-top:4px;}
    .like-btn{background:transparent;border:none;cursor:pointer;padding:4px;flex-shrink:0;}
    .player-seek{padding:20px 28px 6px;}
    .seek-track{height:4px;background:var(--grey3);border-radius:3px;cursor:pointer;position:relative;overflow:hidden;}
    .seek-fill{position:absolute;left:0;top:0;height:100%;background:var(--dark);border-radius:3px;transition:width .1s linear;pointer-events:none;}
    .seek-times{display:flex;justify-content:space-between;margin-top:6px;}
    .seek-time{font-size:12px;color:var(--grey);font-family:monospace;}
    .player-controls{display:flex;align-items:center;justify-content:space-around;padding:16px 20px;}
    .pc-btn{background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--grey);transition:color .12s;padding:6px;}
    .pc-btn.on{color:var(--acc);}
    .pc-btn:active{transform:scale(.9);}
    .pc-play{background:var(--dark);border:none;border-radius:50%;width:64px;height:64px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s,background .1s;}
    .pc-play:active{transform:scale(.93);}
    .player-vol{display:flex;align-items:center;gap:10px;padding:4px 28px 16px;}
    .player-vol svg{color:var(--grey);flex-shrink:0;}
    input[type=range]{-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:var(--grey3);cursor:pointer;outline:none;flex:1;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--dark);cursor:pointer;}

    /* ══ PLAYLISTS SCREEN ══ */
    #s-playlists{padding-top:calc(var(--safe-t) + 8px);}
    .pl-screen-head{padding:10px 22px 4px;display:flex;align-items:flex-end;justify-content:space-between;}
    .pl-screen-scroll{flex:1;overflow-y:auto;padding:10px 16px calc(80px + var(--safe-b));}
    .pl-big-card{background:var(--white);border-radius:18px;padding:14px;display:flex;align-items:center;gap:14px;margin-bottom:10px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.06);transition:transform .1s;}
    .pl-big-card:active{transform:scale(.98);}
    .pl-big-art{width:60px;height:60px;border-radius:12px;flex-shrink:0;display:grid;grid-template-columns:1fr 1fr;gap:2px;overflow:hidden;}
    .pl-big-art div{width:100%;height:100%;}
    .pl-big-art.solo{display:flex;align-items:center;justify-content:center;background:var(--grey3);}
    .pl-big-info{flex:1;min-width:0;}
    .pl-big-name{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .pl-big-sub{font-size:13px;color:var(--grey);margin-top:2px;}
    .pl-big-actions{display:flex;gap:4px;flex-shrink:0;}
    .pl-big-btn{background:transparent;border:none;cursor:pointer;padding:6px;color:var(--grey);display:flex;align-items:center;}

    /* ══ IMPORT SCREEN ══ */
    #s-import{padding-top:calc(var(--safe-t) + 8px);}
    .imp-scroll{flex:1;overflow-y:auto;padding:10px 16px calc(80px + var(--safe-b));}
    .dropzone{background:var(--white);border-radius:20px;padding:36px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;transition:all .18s;border:2px dashed var(--grey2);}
    .dropzone.drag{border-color:var(--acc);background:rgba(124,92,191,.05);}
    .dz-ico{width:56px;height:56px;border-radius:16px;background:var(--grey3);display:flex;align-items:center;justify-content:center;}
    .dz-title{font-size:16px;font-weight:700;text-align:center;}
    .dz-sub{font-size:13px;color:var(--grey);text-align:center;}
    .uplist{margin-top:14px;}
    .upitem{background:var(--white);border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
    .uphd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .upname{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:8px;}
    .uppct{font-size:12px;color:var(--acc);font-weight:600;}
    .upbg{height:4px;background:var(--grey3);border-radius:3px;overflow:hidden;}
    .upfill{height:100%;background:var(--acc);border-radius:3px;transition:width .1s;}
    .updone{color:#34c759;font-size:12px;font-weight:600;}
    .uperr{color:#ff3b30;font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* ══ PLAYLIST DETAIL ══ */
    #s-pldetail{background:#fff;padding-top:calc(var(--safe-t) + 12px);}
    .pld-head{display:flex;align-items:center;gap:10px;padding:0 16px 14px;}
    .back-btn{background:var(--grey3);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
    .pld-scroll{flex:1;overflow-y:auto;padding:0 16px calc(80px + var(--safe-b));}
    .pld-hero{padding:0 16px 20px;display:flex;gap:16px;align-items:center;}
    .pld-art{width:90px;height:90px;border-radius:16px;flex-shrink:0;display:grid;grid-template-columns:1fr 1fr;gap:2px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.12);}
    .pld-art div{width:100%;height:100%;}
    .pld-art.solo{display:flex;align-items:center;justify-content:center;background:var(--grey3);}
    .pld-info{flex:1;}
    .pld-name{font-size:22px;font-weight:800;letter-spacing:-.4px;}
    .pld-count{font-size:13px;color:var(--grey);margin-top:3px;}
    .pld-play-btn{margin-top:10px;background:var(--dark);border:none;border-radius:12px;padding:10px 22px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}

    /* ══ MODALS ══ */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
    .modal-bg.center{align-items:center;}
    .sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:10px 0 calc(16px + var(--safe-b));}
    .sheet.dialog{border-radius:16px;padding:22px;max-width:320px;margin:16px;}
    .sheet-handle{width:36px;height:4px;background:var(--grey2);border-radius:2px;margin:0 auto 16px;}
    .sheet-title{font-size:12px;font-weight:600;color:var(--grey);text-transform:uppercase;letter-spacing:.5px;padding:0 18px 8px;}
    .sheet-item{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;font-size:16px;transition:background .1s;}
    .sheet-item:active{background:var(--grey3);}
    .sheet-item.red{color:#ff3b30;}
    .dialog-title{font-size:18px;font-weight:700;margin-bottom:5px;}
    .dialog-sub{font-size:14px;color:var(--grey);margin-bottom:16px;}
    .dialog-input{width:100%;background:var(--grey3);border:none;border-radius:12px;padding:12px 14px;color:var(--dark);font-size:15px;outline:none;margin-bottom:14px;}
    .dialog-btns{display:flex;gap:8px;}
    .d-btn{flex:1;padding:12px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;}
    .d-btn.cancel{background:var(--grey3);color:var(--grey);}
    .d-btn.confirm{background:var(--dark);color:#fff;}

    /* ══ LOADING ══ */
    #loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:300;}
    .spin{width:28px;height:28px;border:2.5px solid var(--grey3);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ══ NOTIF ══ */
    #notif{position:fixed;bottom:calc(80px + var(--safe-b));left:50%;transform:translateX(-50%);background:var(--dark);border-radius:12px;padding:9px 18px;font-size:13px;font-weight:500;color:#fff;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:250;}
    #notif.show{opacity:1;}

    /* ══ CACHE BAR ══ */
    #cache-bar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--acc2);transform:scaleX(0);transform-origin:left;transition:transform .3s;z-index:300;}
    #cache-bar.show{transform:scaleX(1);}

    /* ══ EMPTY STATE ══ */
    .empty-state{padding:60px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;}
    .empty-icon{width:72px;height:72px;border-radius:20px;background:var(--grey3);display:flex;align-items:center;justify-content:center;}
    .empty-title{font-size:18px;font-weight:700;}
    .empty-sub{font-size:14px;color:var(--grey);}
    .empty-cta{background:var(--dark);border:none;border-radius:14px;padding:12px 26px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;}
  </style>
</head>
<body>

<div id="cache-bar"></div>

<!-- ══ LOADING ══ -->
<div id="loading">
  <div style="width:52px;height:52px;background:var(--acc);border-radius:16px;display:flex;align-items:center;justify-content:center;">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
  </div>
  <div class="spin"></div>
  <p id="ldmsg" style="font-size:14px;color:var(--grey);">Chargement de votre bibliothèque...</p>
</div>

<!-- ══ SCREEN: HOME ══ -->
<div id="s-home" class="screen">
  <div class="home-head">
    <span class="home-title">Melo</span>
    <button class="head-btn" onclick="gotoNav('import')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#111"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
  </div>
  <div class="home-scroll" id="home-scroll">
    <!-- Hero injected by JS -->
    <div id="hero-wrap"></div>
    <!-- Playlists section -->
    <div id="playlists-section" style="display:none">
      <div class="sec-head">
        <span class="sec-title">Mes playlists</span>
        <span class="sec-link" onclick="gotoNav('playlists')" style="cursor:pointer">Tout voir</span>
      </div>
      <div class="cards-row" id="cards-row"></div>
    </div>
    <!-- All tracks -->
    <div class="sec-head">
      <span class="sec-title" id="lib-title">Bibliothèque</span>
      <span class="sec-link" id="lib-count-lbl" style="color:var(--grey)"></span>
    </div>
    <div class="song-list" id="song-list"></div>
  </div>
</div>

<!-- ══ SCREEN: PLAYLISTS ══ -->
<div id="s-playlists" class="screen hidden">
  <div class="pl-screen-head">
    <span class="home-title">Playlists</span>
    <button class="head-btn" onclick="newPlaylist()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#111"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
  </div>
  <div class="pl-screen-scroll" id="pl-screen-list"></div>
</div>

<!-- ══ SCREEN: IMPORT ══ -->
<div id="s-import" class="screen hidden">
  <div style="padding:10px 22px 4px;display:flex;align-items:center;justify-content:space-between;">
    <span class="home-title">Importer</span>
  </div>
  <div class="imp-scroll">
    <div class="dropzone" id="dz">
      <div class="dz-ico">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="var(--grey)"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
      </div>
      <p class="dz-title">Ajouter des musiques</p>
      <p class="dz-sub">Appuyez pour parcourir vos fichiers<br>ou glissez-déposez ici</p>
      <p style="font-size:11px;color:var(--grey2);font-family:monospace">MP3 · WAV · FLAC · OGG · AAC · M4A</p>
    </div>
    <div class="uplist" id="uplist"></div>
    <input id="filein" type="file" multiple accept="audio/*,.mp3,.wav,.ogg,.flac,.aac,.m4a" style="display:none">
  </div>
</div>

<!-- ══ SCREEN: PLAYLIST DETAIL ══ -->

      <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--grey)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>

    <svg id="mp-ico" width="18" height="18" viewBox="0 0 24 24" fill="#111"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <button class="mp-btn" onclick="event.stopPropagation();goNext()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>

<!-- ══ BOTTOM NAV ══ -->
<div id="bottom-nav">
  <button class="nav-item active" id="nav-home" onclick="gotoNav('home')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--acc)"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span class="nav-label" style="color:var(--acc)">Accueil</span>
  </button>
  <button class="nav-item" id="nav-playlists" onclick="gotoNav('playlists')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--grey2)"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
    <span class="nav-label">Playlists</span>
  </button>
  <button class="nav-item" id="nav-import" onclick="gotoNav('import')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--grey2)"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
    <span class="nav-label">Importer</span>
  </button>
</div>

<div id="notif"></div>
<audio id="aud"></audio>

<script>
const API    = '/api/api';
const BUCKET = 'melo-music-2026';

let tracks=[], playlists=[], liked=new Set();
let cur=null, isPlaying=false, isShuffle=false, repeatMode=0, isMuted=false, volume=0.8;
let dlUrl='', dlToken='', queueIds=null, currentPl=null, prevNav='home';
const blobCache=new Map(), cacheOrder=[];
const CACHE_MAX=10;
const aud=document.getElementById('aud');
aud.volume=volume;

/* ══ UTILS ══ */
const fmt  = t=>(!t||isNaN(t))?'0:00':`${Math.floor(t/60)}:${String(Math.floor(t%60)).padStart(2,'0')}`;
const hue  = s=>{let h=0;for(let c of s)h=((h<<5)-h+c.charCodeAt(0))|0;return Math.abs(h)%360;};
const abg  = h=>`hsl(${h},55%,62%)`;
const abg2 = h=>`hsl(${h},45%,50%)`;
const esc  = s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const genId= ()=>Date.now()+'_'+Math.random().toString(36).slice(2);
const noteIco=(sz,col)=>`<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="${col}"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`;

function notify(msg,ms=2400){const el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),ms);}

/* ══ NAVIGATION ══ */
const SCREENS={home:'s-home',playlists:'s-playlists',import:'s-import',pldetail:'s-pldetail',player:'s-player'};
let activeScreen='home';

function showScreen(name, fromLeft=false){
  const prev=document.getElementById(SCREENS[activeScreen]);
  const next=document.getElementById(SCREENS[name]);
  if(!next||prev===next) return;
  prev.classList.remove('slide-left');
  if(!fromLeft) prev.classList.add('slide-left');
  else prev.classList.add('hidden');
  next.classList.remove('hidden','slide-left');
  activeScreen=name;
}

function closePlayer(){
  const s=document.getElementById('s-player');
  s.classList.add('hidden');
  activeScreen=prevNav||'home';
}

function openPlayer(){
  prevNav=activeScreen;
  showScreen('player');
}

function gotoNav(name){
  ['home','playlists','import'].forEach(n=>{
    document.getElementById('nav-'+n)?.classList.toggle('active',n===name);
    const ico=document.querySelector('#nav-'+n+' svg');
    const lbl=document.querySelector('#nav-'+n+' .nav-label');
    if(ico) ico.style.fill=n===name?'var(--acc)':'var(--grey2)';
    if(lbl){ lbl.style.color=n===name?'var(--acc)':''; }
  });
  showScreen(name, false);
  if(name==='home') renderHome();
  if(name==='playlists') renderPlScreen();
}

/* ══ CACHE ══ */
function isCached(id){return blobCache.has(id);}
function addToCache(id,url){
  if(blobCache.has(id)) return;
  if(cacheOrder.length>=CACHE_MAX){const old=cacheOrder.shift();const u=blobCache.get(old);if(u)URL.revokeObjectURL(u);blobCache.delete(old);}
  blobCache.set(id,url);cacheOrder.push(id);
}
function scheduleCacheDl(t){
  if(isCached(t.id)) return;
  setTimeout(async()=>{
    if(isCached(t.id)) return;
    try{
      document.getElementById('cache-bar').classList.add('show');
      const r=await fetch(rawUrl(t.key));
      if(!r.ok) return;
      const blob=await r.blob();
      addToCache(t.id,URL.createObjectURL(blob));
      document.getElementById('cache-bar').classList.remove('show');
      renderHome();
    }catch(_){document.getElementById('cache-bar').classList.remove('show');}
  },3000);
}
const rawUrl=key=>`${dlUrl}/file/${BUCKET}/${encodeURIComponent(key)}?Authorization=${encodeURIComponent(dlToken)}`;

/* ══ META ══ */
async function saveMeta(){
  try{await fetch(`${API}?action=save-meta`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tracks,playlists})});}catch(e){console.error(e);}
}

/* ══ RENDER HOME ══ */
function renderHome(){
  /* Hero */
  const hw=document.getElementById('hero-wrap');
  if(cur!==null&&tracks[cur]){
    const t=tracks[cur],h=t.hue||hue(t.name);
    hw.innerHTML=`<div class="hero" onclick="openPlayer()">
      <div class="hero-gradient" style="background:linear-gradient(135deg,${abg2(h)}dd,${abg(h)}99)"></div>
      <div class="hero-content">
        <p class="hero-sub">En lecture</p>
        <p class="hero-name">${esc(t.name)}</p>
        <p class="hero-artist">${esc(t.artist)}</p>
      </div>
      <button class="hero-play" onclick="event.stopPropagation();togglePlay()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="${abg2(h)}">${isPlaying?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>'}</svg>
      </button>
    </div>`;
  } else {
    hw.innerHTML=`<div style="margin:8px 22px 0;border-radius:20px;height:170px;background:linear-gradient(135deg,#7c5cbf,#a78bfa);display:flex;flex-direction:column;justify-content:flex-end;padding:20px;cursor:pointer" onclick="gotoNav('import')">
      <p style="font-size:11px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Bienvenue sur</p>
      <p style="font-size:26px;font-weight:800;color:#fff;letter-spacing:-.5px">Melo</p>
      <p style="font-size:13px;color:rgba(255,255,255,.75);margin-top:2px">Importez votre musique pour commencer</p>
    </div>`;
  }

  /* Playlists section */
  const ps=document.getElementById('playlists-section');
  const cr=document.getElementById('cards-row');
  if(playlists.length){
    ps.style.display='';
    cr.innerHTML=playlists.slice(0,8).map(pl=>{
      const colors=pl.trackIds.slice(0,4).map(id=>{const t=tracks.find(x=>x.id===id);return t?abg(t.hue||hue(t.name)):'#e5e5ea';});
      const artHtml=colors.length>=2
        ?`<div class="pl-card-grid">${colors.slice(0,4).map(c=>`<div style="background:${c}"></div>`).join('')}</div>`
        :`<div class="pl-card-solo">${noteIco(36,'rgba(0,0,0,.2)')}</div>`;
      const bg=colors[0]||'#e5e5ea';
      return `<div class="pl-card" onclick="openPlDetail('${pl.id}')">
        <div class="pl-card-art" style="background:${bg}">${artHtml}</div>
        <p class="pl-card-name">${esc(pl.name)}</p>
        <p class="pl-card-sub">${pl.trackIds.length} titre${pl.trackIds.length>1?'s':''}</p>
      </div>`;
    }).join('')+`<div class="pl-new-card" onclick="newPlaylist()">
      <div class="pl-new-art"><svg width="28" height="28" viewBox="0 0 24 24" fill="var(--grey2)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
      <p class="pl-card-name" style="color:var(--grey);text-align:center">Nouvelle</p>
    </div>`;
  } else {
    ps.style.display='none';
  }

  /* Song list */
  const sl=document.getElementById('song-list');
  const lc=document.getElementById('lib-count-lbl');
  if(!tracks.length){
    lc.textContent='';
    sl.innerHTML=`<div class="empty-state">
      <div class="empty-icon">${noteIco(34,'var(--grey)')}</div>
      <p class="empty-title">Bibliothèque vide</p>
      <p class="empty-sub">Ajoutez vos fichiers audio pour commencer</p>
      <button class="empty-cta" onclick="gotoNav('import')">Importer de la musique</button>
    </div>`;
    return;
  }
  lc.textContent=tracks.length+' titre'+(tracks.length>1?'s':'');
  sl.innerHTML=tracks.map((t,i)=>{
    const h=t.hue||hue(t.name),isCur=i===cur,cached=isCached(t.id);
    const art=isCur&&isPlaying
      ?`<div class="eq on"><span style="height:6px"></span><span style="height:13px"></span><span style="height:9px"></span></div>`
      :noteIco(20,'rgba(255,255,255,.8)');
    return `<div class="song-row${isCur?' active':''}" onclick="rowClick(event,${i})">
      <div class="song-art" style="background:${abg(h)}">${art}${cached?'<div class="song-cached"></div>':''}</div>
      <div class="song-info">
        <p class="song-name">${esc(t.name)}</p>
        <p class="song-artist">${esc(t.artist)}</p>
      </div>
      <button class="song-menu" onclick="openTrackMenu(event,'${t.id}')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      </button>
    </div>`;
  }).join('');
}

function rowClick(e,idx){if(!e.target.closest('.song-menu')) playAt(idx);}

/* ══ TRACK MENU ══ */
function openTrackMenu(e,trackId){
  e.stopPropagation();
  const t=tracks.find(x=>x.id===trackId);if(!t) return;
  const plItems=playlists.map(pl=>`<div class="sheet-item" onclick="addToPlaylist('${trackId}','${pl.id}');closeModal()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--acc)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>${esc(pl.name)}</div>`).join('');
  showModal(`<div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">${esc(t.name)}</div>
    ${plItems||''}
    <div class="sheet-item" onclick="newPlaylistWithTrack('${trackId}');closeModal()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--grey)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Nouvelle playlist...</div>
    ${isCached(trackId)?`<div class="sheet-item" onclick="uncacheTrack('${trackId}');closeModal()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--grey)"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>Retirer du cache</div>`:''}
    <div class="sheet-item red" onclick="deleteTrack('${trackId}');closeModal()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#ff3b30"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>Supprimer</div>
  </div>`);
}

function uncacheTrack(id){const u=blobCache.get(id);if(u)URL.revokeObjectURL(u);blobCache.delete(id);const i=cacheOrder.indexOf(id);if(i>-1)cacheOrder.splice(i,1);renderHome();notify('Retiré du cache');}

async function deleteTrack(id){
  const t=tracks.find(x=>x.id===id);if(!t) return;
  const ti=tracks.indexOf(t);
  try{await fetch(`${API}?action=delete&key=${encodeURIComponent(t.key)}&fileId=${encodeURIComponent(t.fileId||'')}`);}catch(_){}
  tracks=tracks.filter(x=>x.id!==id);
  playlists.forEach(pl=>{pl.trackIds=pl.trackIds.filter(x=>x!==id);});
  uncacheTrack(id);
  await saveMeta();
  if(cur===ti){cur=null;isPlaying=false;aud.pause();aud.src='';updateMiniPlayer();}
  else if(cur!==null&&ti<cur) cur--;
  renderHome();notify('Supprimé ✓');
}

/* ══ PLAYLISTS ══ */
function renderPlScreen(){
  const el=document.getElementById('pl-screen-list');
  if(!playlists.length){
    el.innerHTML=`<div class="empty-state">
      <div class="empty-icon"><svg width="34" height="34" viewBox="0 0 24 24" fill="var(--grey)"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg></div>
      <p class="empty-title">Aucune playlist</p>
      <p class="empty-sub">Créez votre première playlist</p>
      <button class="empty-cta" onclick="newPlaylist()">Créer une playlist</button>
    </div>`;
    return;
  }
  el.innerHTML=playlists.map(pl=>{
    const colors=pl.trackIds.slice(0,4).map(id=>{const t=tracks.find(x=>x.id===id);return t?abg(t.hue||hue(t.name)):'#e5e5ea';});
    const artHtml=colors.length>=2
      ?colors.slice(0,4).map(c=>`<div style="background:${c}"></div>`).join('')
      :``;
    return `<div class="pl-big-card">
      <div class="pl-big-art${colors.length<2?' solo':''}" onclick="openPlDetail('${pl.id}')">${colors.length>=2?artHtml:noteIco(28,'var(--grey)')}</div>
      <div class="pl-big-info" onclick="openPlDetail('${pl.id}')">
        <p class="pl-big-name">${esc(pl.name)}</p>
        <p class="pl-big-sub">${pl.trackIds.length} titre${pl.trackIds.length>1?'s':''}</p>
      </div>
      <div class="pl-big-actions">
        <button class="pl-big-btn" onclick="playPlaylist('${pl.id}')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--acc)"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="pl-big-btn" onclick="openPlMenu(event,'${pl.id}')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--grey2)"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function openPlDetail(id){
  currentPl=playlists.find(p=>p.id===id);if(!currentPl) return;
  document.getElementById('pld-title').textContent=currentPl.name;
  document.getElementById('pld-back').onclick=()=>{showScreen('playlists',true);renderPlScreen();};
  renderPlDetail();
  showScreen('pldetail');
}

function renderPlDetail(){
  const el=document.getElementById('pld-scroll');
  if(!currentPl){el.innerHTML='';return;}
  const colors=currentPl.trackIds.slice(0,4).map(id=>{const t=tracks.find(x=>x.id===id);return t?abg(t.hue||hue(t.name)):'#e5e5ea';});
  const artHtml=colors.length>=2?colors.slice(0,4).map(c=>`<div style="background:${c}"></div>`).join(''):'';
  const plTracks=currentPl.trackIds.map(id=>tracks.find(t=>t.id===id)).filter(Boolean);
  el.innerHTML=`<div class="pld-hero">
    <div class="pld-art${colors.length<2?' solo':''}">${colors.length>=2?artHtml:noteIco(32,'var(--grey)')}</div>
    <div class="pld-info">
      <p class="pld-name">${esc(currentPl.name)}</p>
      <p class="pld-count">${plTracks.length} titre${plTracks.length>1?'s':''}</p>
      <button class="pld-play-btn" onclick="playPlaylist('${currentPl.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>Lancer
      </button>
    </div>
  </div>`+
  (plTracks.length?`<div class="song-list">`+plTracks.map(t=>{
    const ri=tracks.indexOf(t),isCur=ri===cur,h=t.hue||hue(t.name),cached=isCached(t.id);
    const art=isCur&&isPlaying?`<div class="eq on"><span style="height:6px"></span><span style="height:13px"></span><span style="height:9px"></span></div>`:noteIco(20,'rgba(255,255,255,.8)');
    return `<div class="song-row${isCur?' active':''}" onclick="playFromPl('${currentPl.id}','${t.id}')">
      <div class="song-art" style="background:${abg(h)}">${art}${cached?'<div class="song-cached"></div>':''}</div>
      <div class="song-info"><p class="song-name">${esc(t.name)}</p><p class="song-artist">${esc(t.artist)}</p></div>
      <button class="song-menu" onclick="removeFromPl(event,'${currentPl.id}','${t.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--grey2)"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>`;
  }).join('')+`</div>`
  :`<p class="pl-empty" style="padding:40px;text-align:center;color:var(--grey);font-size:14px">Playlist vide<br>Ajoutez des titres depuis la bibliothèque.</p>`);
}

function playFromPl(plId,trackId){const pl=playlists.find(p=>p.id===plId);if(!pl) return;queueIds=pl.trackIds;const idx=tracks.findIndex(t=>t.id===trackId);if(idx>-1) playAt(idx);}
function playPlaylist(id){const pl=playlists.find(p=>p.id===id);if(!pl||!pl.trackIds.length) return;queueIds=pl.trackIds;const fi=tracks.findIndex(t=>t.id===pl.trackIds[0]);if(fi>-1) playAt(fi);}

function openPlMenu(e,id){
  e.stopPropagation();
  const pl=playlists.find(p=>p.id===id);if(!pl) return;
  showModal(`<div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">${esc(pl.name)}</div>
    <div class="sheet-item" onclick="renamePl('${id}');closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--grey)"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>Renommer</div>
    <div class="sheet-item red" onclick="deletePl('${id}');closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="#ff3b30"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>Supprimer</div>
  </div>`);
}

function newPlaylist(){showDialog('Nouvelle playlist','Nom...',name=>{if(!name.trim()) return;playlists.push({id:genId(),name:name.trim(),trackIds:[]});saveMeta();renderPlScreen();renderHome();notify('Playlist créée ✓');});}
function newPlaylistWithTrack(tid){showDialog('Nouvelle playlist','Nom...',name=>{if(!name.trim()) return;const pl={id:genId(),name:name.trim(),trackIds:[tid]};playlists.push(pl);saveMeta();renderHome();notify('Ajouté à "'+pl.name+'" ✓');});}
function renamePl(id){const pl=playlists.find(p=>p.id===id);if(!pl) return;showDialog('Renommer',pl.name,name=>{if(!name.trim()) return;pl.name=name.trim();if(currentPl?.id===id) document.getElementById('pld-title').textContent=pl.name;saveMeta();renderPlScreen();renderHome();notify('Renommée ✓');});}
async function deletePl(id){playlists=playlists.filter(p=>p.id!==id);if(currentPl?.id===id){currentPl=null;queueIds=null;}await saveMeta();renderPlScreen();renderHome();notify('Playlist supprimée');}
function editCurrentPl(){if(currentPl) renamePl(currentPl.id);}
function addToPlaylist(tid,plId){const pl=playlists.find(p=>p.id===plId);if(!pl) return;if(pl.trackIds.includes(tid)){notify('Déjà dans cette playlist');return;}pl.trackIds.push(tid);saveMeta();notify('Ajouté à "'+pl.name+'" ✓');}
async function removeFromPl(e,plId,tid){e.stopPropagation();const pl=playlists.find(p=>p.id===plId);if(!pl) return;pl.trackIds=pl.trackIds.filter(x=>x!==tid);await saveMeta();renderPlDetail();notify('Retiré ✓');}

/* ══ PLAYBACK ══ */
function playAt(idx){
  const t=tracks[idx];if(!t||!dlToken) return;
  cur=idx;
  aud.src=isCached(t.id)?blobCache.get(t.id):rawUrl(t.key);
  aud.load();
  aud.play().catch(e=>console.error(e));
  if(!isCached(t.id)) scheduleCacheDl(t);
  renderHome();renderPlDetail();updateMiniPlayer();updatePlayerScreen();
}

function togglePlay(){if(cur===null) return;if(isPlaying){aud.pause();isPlaying=false;}else{aud.play().catch(()=>{});isPlaying=true;}updatePlayBtns();renderHome();renderPlDetail();}

function getQ(){return queueIds?tracks.filter(t=>queueIds.includes(t.id)):tracks;}
function getNextIdx(){const q=getQ();if(!q.length) return null;if(isShuffle){let i;do{i=Math.floor(Math.random()*q.length);}while(q.length>1&&tracks.indexOf(q[i])===cur);return tracks.indexOf(q[i]);}const ci=q.findIndex(t=>tracks.indexOf(t)===cur);return tracks.indexOf(q[(ci+1)%q.length]);}
function getPrevIdx(){const q=getQ();if(!q.length) return null;const ci=q.findIndex(t=>tracks.indexOf(t)===cur);return tracks.indexOf(q[(ci-1+q.length)%q.length]);}
function goNext(){if(repeatMode===2){aud.currentTime=0;aud.play();return;}const i=getNextIdx();if(i!==null) playAt(i);}
function goPrev(){if(aud.currentTime>3){aud.currentTime=0;return;}const i=getPrevIdx();if(i!==null) playAt(i);}
function toggleShuffle(){isShuffle=!isShuffle;document.getElementById('pc-shuf').classList.toggle('on',isShuffle);}
function toggleRepeat(){repeatMode=(repeatMode+1)%3;document.getElementById('pc-rep').classList.toggle('on',repeatMode>0);document.getElementById('pc-repdot').style.display=repeatMode>0?'block':'none';document.getElementById('pc-repico').innerHTML=repeatMode===2?'<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/>':'<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>';}
function setVol(v){volume=parseFloat(v);isMuted=false;aud.volume=volume;}
function toggleLike(){const t=tracks[cur];if(!t) return;if(liked.has(t.id)){liked.delete(t.id);document.querySelector('#like-btn svg').style.fill='var(--grey2)';}else{liked.add(t.id);document.querySelector('#like-btn svg').style.fill='#ff3b30';}}

/* ══ UPDATE UI ══ */
function updatePlayBtns(){
  const pico=`<path d="${isPlaying?'M6 19h4V5H6v14zm8-14v14h4V5h-4z':'M8 5v14l11-7z'}"/>`;
  document.getElementById('pc-ico').innerHTML=pico;
  document.getElementById('mp-ico').innerHTML=`<path d="${isPlaying?'M6 19h4V5H6v14zm8-14v14h4V5h-4z':'M8 5v14l11-7z'}"/>`;
}

function updateMiniPlayer(){
  const mp=document.getElementById('mini-player');
  if(cur===null){mp.classList.remove('show');return;}
  const t=tracks[cur],h=t.hue||hue(t.name);
  mp.classList.add('show');
  document.getElementById('mp-art').style.background=abg(h);
  document.getElementById('mp-art').innerHTML=noteIco(18,'rgba(255,255,255,.8)');
  document.getElementById('mp-name').textContent=t.name;
  document.getElementById('mp-artist').textContent=t.artist;
  updatePlayBtns();
}

function updatePlayerScreen(){
  if(cur===null) return;
  const t=tracks[cur],h=t.hue||hue(t.name);
  const pa=document.getElementById('player-art');
  pa.style.background=`linear-gradient(135deg,${abg(h)},${abg2(h)})`;
  pa.innerHTML=noteIco(80,'rgba(255,255,255,.4)');
  pa.classList.remove('pulse');
  requestAnimationFrame(()=>pa.classList.add('pulse'));
  document.getElementById('player-title').textContent=t.name;
  document.getElementById('player-artist').textContent=t.artist;
  document.querySelector('#like-btn svg').style.fill=liked.has(t.id)?'#ff3b30':'var(--grey2)';
  updatePlayBtns();
}

/* ══ AUDIO EVENTS ══ */
document.getElementById('seek-track').addEventListener('click',e=>{
  if(!aud.duration) return;
  const r=e.currentTarget.getBoundingClientRect();
  aud.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*aud.duration;
});
aud.addEventListener('timeupdate',()=>{
  const p=aud.duration?(aud.currentTime/aud.duration)*100:0;
  document.getElementById('seek-fill').style.width=p+'%';
  document.getElementById('mp-prog-fill').style.width=p+'%';
  document.getElementById('p-pt').textContent=fmt(aud.currentTime);
  document.getElementById('p-dt').textContent=fmt(aud.duration);
});
aud.addEventListener('play', ()=>{isPlaying=true;updatePlayBtns();renderHome();renderPlDetail();});
aud.addEventListener('pause',()=>{isPlaying=false;updatePlayBtns();renderHome();renderPlDetail();});
aud.addEventListener('ended',goNext);

/* ══ MODAL ══ */
let modalEl=null;
function showModal(html){closeModal();modalEl=document.createElement('div');modalEl.className='modal-bg';modalEl.innerHTML=html;modalEl.addEventListener('click',e=>{if(e.target===modalEl)closeModal();});document.body.appendChild(modalEl);}
function closeModal(){if(modalEl){modalEl.remove();modalEl=null;}}
function showDialog(title,placeholder,onConfirm){
  showModal(`<div class="modal-bg center" style="position:static;display:flex;align-items:center;justify-content:center;width:100%">
    <div class="sheet dialog">
      <p class="dialog-title">${esc(title)}</p>
      <input class="dialog-input" id="dia-in" placeholder="${esc(placeholder)}">
      <div class="dialog-btns">
        <button class="d-btn cancel" onclick="closeModal()">Annuler</button>
        <button class="d-btn confirm" id="dia-ok">Créer</button>
      </div>
    </div></div>`);
  const inp=document.getElementById('dia-in');
  const btn=document.getElementById('dia-ok');
  if(inp) setTimeout(()=>inp.focus(),50);
  if(btn) btn.onclick=()=>{onConfirm(inp?inp.value:'');closeModal();};
  if(inp) inp.addEventListener('keydown',e=>{if(e.key==='Enter'){onConfirm(inp.value);closeModal();}});
}

/* ══ IMPORT ══ */
const dz=document.getElementById('dz');
dz.addEventListener('click',()=>document.getElementById('filein').click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFiles(e.dataTransfer.files);});
document.getElementById('filein').addEventListener('change',e=>handleFiles(e.target.files));

function handleFiles(files){
  const af=[...files].filter(f=>f.type.startsWith('audio/')||/\.(mp3|wav|ogg|flac|aac|m4a|opus)$/i.test(f.name));
  if(!af.length){notify('Aucun fichier audio détecté');return;}
  af.forEach(uploadFile);
}

async function uploadFile(file){
  const id=genId(),ext=(file.name.match(/\.[^.]+$/)||['.mp3'])[0].toLowerCase();
  const key='tracks/'+id+ext,name=file.name.replace(/\.[^.]+$/,'').replace(/[_\-]+/g,' ').trim();
  const ul=document.getElementById('uplist');
  const item=document.createElement('div');item.className='upitem';
  item.innerHTML=`<div class="uphd"><span class="upname">${esc(name)}</span><span class="uppct" id="pct-${id}">0%</span></div><div class="upbg"><div class="upfill" id="bar-${id}" style="width:0%"></div></div>`;
  ul.prepend(item);
  const setP=p=>{const pe=document.getElementById('pct-'+id),be=document.getElementById('bar-'+id);if(pe)pe.textContent=p+'%';if(be)be.style.width=p+'%';};
  try{
    const cr=await fetch(`${API}?action=upload-creds`);
    if(!cr.ok) throw new Error('Credentials indisponibles');
    const creds=await cr.json();
    const buf=await file.arrayBuffer();
    const hash=await crypto.subtle.digest('SHA-1',buf);
    const sha1=Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
    const fileId=await new Promise((resolve,reject)=>{
      const xhr=new XMLHttpRequest();
      xhr.open('POST',creds.uploadUrl);
      xhr.setRequestHeader('Authorization',creds.authorizationToken);
      xhr.setRequestHeader('X-Bz-File-Name',encodeURIComponent(key));
      xhr.setRequestHeader('Content-Type',file.type||'audio/mpeg');
      xhr.setRequestHeader('X-Bz-Content-Sha1',sha1);
      xhr.upload.onprogress=e=>{if(e.lengthComputable)setP(Math.round(e.loaded/e.total*100));};
      xhr.onload=()=>{try{const r=JSON.parse(xhr.responseText);if(xhr.status>=200&&xhr.status<300)resolve(r.fileId);else reject(new Error(`B2 ${xhr.status}: ${r.message||''}`));}catch(e){reject(new Error('Réponse invalide'));}};
      xhr.onerror=()=>reject(new Error('Erreur réseau'));
      xhr.send(new Blob([buf]));
    });
    item.querySelector('.uphd').innerHTML=`<span class="upname">${esc(name)}</span><span class="updone">✓ Uploadé</span>`;
    item.querySelector('.upbg').style.display='none';
    tracks.push({id,key,name,artist:'Artiste inconnu',hue:hue(name),fileId});
    await saveMeta();renderHome();notify('✓ '+name+' ajouté');
  }catch(err){
    console.error(err);
    item.querySelector('.uphd').innerHTML=`<span class="upname">${esc(name)}</span><span class="uperr">✗ ${esc(err.message)}</span>`;
    item.querySelector('.upbg').style.display='none';
    notify('Erreur: '+err.message.slice(0,50));
  }
}

/* ══ INIT ══ */
async function init(){
  try{
    const r=await fetch(`${API}?action=init`);
    if(!r.ok) throw new Error('Serveur indisponible ('+r.status+')');
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    tracks=Array.isArray(d.tracks)?d.tracks:[];
    playlists=Array.isArray(d.playlists)?d.playlists:[];
    dlUrl=d.downloadUrl;dlToken=d.downloadToken;
    document.getElementById('loading').style.display='none';
    renderHome();
  }catch(e){
    document.getElementById('ldmsg').textContent='❌ '+e.message;
    document.getElementById('ldmsg').style.color='#ff3b30';
    document.querySelector('.spin').style.display='none';
  }
}
init();
</script>
