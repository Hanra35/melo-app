<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Melo</title>
  <style>
    :root {
      --bg: #0c0b10;
      --surf: #14121c;
      --card: #1e1b2a;
      --hover: #252233;
      --border: rgba(255,255,255,.07);
      --acc: #8b5cf6;
      --acc2: #7c3aed;
      --acclo: rgba(139,92,246,.12);
      --txt: #f0f0f8;
      --muted: #6b6880;
      --dim: #3a3550;
      --green: #1db954;
      --red: #ef4444;
      --nav-h: 56px;
      --player-h: 130px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; overflow:hidden; }
    body { background:var(--bg); color:var(--txt); font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif; display:flex; flex-direction:column; }
    ::-webkit-scrollbar { width:3px } ::-webkit-scrollbar-track { background:transparent } ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px }
    input[type=range] { -webkit-appearance:none; appearance:none; height:3px; border-radius:2px; background:rgba(255,255,255,.15); cursor:pointer; outline:none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--acc); cursor:pointer; }

    /* ── NAV ── */
    #nav { display:flex; align-items:center; gap:4px; padding:0 14px; height:var(--nav-h); border-bottom:1px solid var(--border); flex-shrink:0; background:var(--bg); position:relative; z-index:10; }
    .logo { display:flex; align-items:center; gap:7px; flex-shrink:0; margin-right:4px; }
    .logo-icon { width:30px; height:30px; background:var(--acc); border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .logo-text { font-weight:700; font-size:16px; letter-spacing:-.4px; }
    .tabs { display:flex; gap:1px; flex:1; }
    .tab { padding:5px 10px; border-radius:7px; border:1px solid transparent; font-size:12.5px; cursor:pointer; background:transparent; color:var(--muted); transition:all .12s; white-space:nowrap; font-weight:500; }
    .tab.active { background:var(--card); border-color:var(--border); color:var(--txt); }
    .imp-btn { flex-shrink:0; background:var(--acclo); border:1px solid var(--acc); border-radius:7px; padding:5px 10px; color:#a78bfa; font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:3px; margin-left:4px; }

    /* ── CONTENT ── */
    #content { flex:1; overflow:hidden; position:relative; }

    /* ── LIBRARY VIEW ── */
    #v-library { height:100%; display:flex; flex-direction:column; }
    .lib-toolbar { display:flex; align-items:center; gap:8px; padding:10px 14px 6px; flex-shrink:0; }
    .srchwrap { position:relative; flex:1; display:flex; align-items:center; }
    .srchwrap svg { position:absolute; left:9px; pointer-events:none; flex-shrink:0; }
    #srch { width:100%; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:7px 10px 7px 28px; color:var(--txt); font-size:13px; outline:none; }
    #srch::placeholder { color:var(--muted); }
    .sort-btn { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:7px 10px; color:var(--muted); font-size:12px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    #libinner { flex:1; overflow-y:auto; padding:6px 14px 14px; }
    .lib-count { font-size:11px; color:var(--muted); letter-spacing:.5px; text-transform:uppercase; font-weight:500; margin-bottom:10px; padding-top:4px; }

    /* ── TRACK ROW ── */
    .track-row { display:flex; align-items:center; gap:11px; padding:7px 8px; border-radius:10px; border:1px solid transparent; cursor:pointer; margin-bottom:2px; transition:background .1s,border-color .1s; }
    .track-row:hover,.track-row:active { background:rgba(139,92,246,.08); border-color:rgba(139,92,246,.15); }
    .track-row.active { background:rgba(139,92,246,.10); border-color:rgba(139,92,246,.25); }
    .art { width:42px; height:42px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; position:relative; }
    .cached-dot { position:absolute; bottom:3px; right:3px; width:6px; height:6px; border-radius:50%; background:var(--green); border:1.5px solid var(--bg); }
    .tinfo { flex:1; min-width:0; }
    .tname { font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--txt); }
    .tname.cur { color:var(--acc); font-weight:600; }
    .tartist { font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:1px; }
    .row-actions { display:flex; align-items:center; gap:2px; flex-shrink:0; }
    .row-btn { opacity:0; background:transparent; border:none; color:var(--muted); cursor:pointer; padding:5px; border-radius:6px; display:flex; align-items:center; transition:opacity .15s,color .1s; }
    .track-row:hover .row-btn,.track-row:active .row-btn { opacity:1; }
    .row-btn:hover { color:var(--txt); }
    @keyframes b1{0%{height:5px}100%{height:18px}} @keyframes b2{0%{height:13px}100%{height:6px}} @keyframes b3{0%{height:9px}100%{height:17px}}
    .eq { display:flex; gap:2px; align-items:flex-end; height:18px; }
    .eq span { width:3px; background:var(--acc); border-radius:2px; }
    .eq.on span:nth-child(1){animation:b1 .7s ease-in-out infinite alternate;} .eq.on span:nth-child(2){animation:b2 .7s ease-in-out infinite alternate .18s;} .eq.on span:nth-child(3){animation:b3 .7s ease-in-out infinite alternate .36s;}
    .empty { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--muted); padding:20px; text-align:center; }
    .empty-icon { width:68px; height:68px; border-radius:16px; background:var(--card); display:flex; align-items:center; justify-content:center; }
    .cta { background:var(--acc); border:none; border-radius:10px; padding:9px 22px; color:#fff; font-weight:600; font-size:13px; cursor:pointer; }

    /* ── PLAYLISTS VIEW ── */
    #v-playlists { height:100%; display:flex; flex-direction:column; }
    .pl-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px 8px; flex-shrink:0; }
    .pl-title { font-size:13px; color:var(--muted); font-weight:500; letter-spacing:.5px; text-transform:uppercase; }
    .pl-new-btn { background:var(--acclo); border:1px solid var(--acc); border-radius:8px; padding:5px 12px; color:#a78bfa; font-size:12px; font-weight:600; cursor:pointer; }
    #plinner { flex:1; overflow-y:auto; padding:0 14px 14px; }
    .pl-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:10px; cursor:pointer; display:flex; align-items:center; gap:12px; transition:background .1s,border-color .1s; }
    .pl-card:hover,.pl-card:active { background:var(--hover); border-color:rgba(139,92,246,.2); }
    .pl-art { width:48px; height:48px; border-radius:10px; display:grid; grid-template-columns:1fr 1fr; gap:2px; overflow:hidden; flex-shrink:0; background:var(--dim); }
    .pl-art-1 { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    .pl-art div { width:100%; height:100%; }
    .pl-info { flex:1; min-width:0; }
    .pl-name { font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pl-sub { font-size:12px; color:var(--muted); margin-top:2px; }
    .pl-actions { display:flex; gap:4px; }
    .pl-btn { background:transparent; border:none; color:var(--muted); cursor:pointer; padding:5px; border-radius:6px; display:flex; align-items:center; }
    .pl-btn:hover { color:var(--txt); }

    /* ── PLAYLIST DETAIL VIEW ── */
    #v-pldetail { height:100%; display:flex; flex-direction:column; display:none; }
    .pld-header { display:flex; align-items:center; gap:10px; padding:10px 14px; flex-shrink:0; border-bottom:1px solid var(--border); }
    .back-btn { background:transparent; border:none; color:var(--muted); cursor:pointer; padding:4px; border-radius:6px; display:flex; align-items:center; flex-shrink:0; }
    .back-btn:hover { color:var(--txt); }
    .pld-name { font-size:15px; font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pld-edit { background:transparent; border:none; color:var(--muted); cursor:pointer; padding:4px; border-radius:6px; font-size:12px; }
    #pldetailinner { flex:1; overflow-y:auto; padding:8px 14px 14px; }
    .pl-empty { padding:40px 20px; text-align:center; color:var(--muted); font-size:13px; }

    /* ── IMPORT VIEW ── */
    #v-import { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:20px 16px; overflow-y:auto; gap:0; }
    .dropzone { width:100%; max-width:460px; padding:36px 24px; border:2px dashed var(--border); border-radius:16px; background:var(--surf); display:flex; flex-direction:column; align-items:center; gap:12px; cursor:pointer; transition:all .18s; flex-shrink:0; }
    .dropzone.drag { border-color:var(--acc); background:var(--acclo); }
    .dz-icon { width:52px; height:52px; border-radius:12px; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; transition:all .18s; }
    .dropzone.drag .dz-icon { background:rgba(139,92,246,.15); border-color:var(--acc); }
    .dz-title { font-weight:600; font-size:14px; text-align:center; }
    .dropzone.drag .dz-title { color:#a78bfa; }
    .uplist { width:100%; max-width:460px; margin-top:14px; }
    .upitem { background:var(--surf); border:1px solid var(--border); border-radius:10px; padding:10px 13px; margin-bottom:8px; }
    .uphd { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .upname { font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; margin-right:8px; }
    .uppct { font-size:12px; color:var(--acc); font-weight:500; flex-shrink:0; }
    .upbg { height:3px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; }
    .upfill { height:100%; background:var(--acc); border-radius:2px; transition:width .1s; }
    .updone { color:var(--green); font-size:12px; flex-shrink:0; }
    .uperr { color:var(--red); font-size:11px; flex-shrink:0; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ── PLAYER ── */
    #player { background:var(--surf); border-top:1px solid var(--border); padding:10px 16px calc(10px + var(--safe-bottom)); flex-shrink:0; }
    .seekrow { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .ttime { font-size:10px; color:var(--muted); min-width:28px; font-family:monospace; }
    .seekbar { flex:1; height:4px; background:rgba(255,255,255,.1); border-radius:2px; cursor:pointer; position:relative; overflow:hidden; }
    .seekfill { position:absolute; left:0; top:0; height:100%; background:var(--acc); border-radius:2px; transition:width .1s linear; pointer-events:none; }
    .ctrlrow { display:flex; align-items:center; }
    .nowplay { flex:1; display:flex; align-items:center; gap:9px; overflow:hidden; min-width:0; }
    .nowart { width:36px; height:36px; border-radius:7px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .nowinfo { min-width:0; }
    .nowname { font-size:13px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .nowartist { font-size:11px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .cc { display:flex; align-items:center; gap:2px; flex-shrink:0; }
    .cb { background:transparent; border:none; color:var(--muted); cursor:pointer; padding:7px; border-radius:8px; display:flex; align-items:center; justify-content:center; transition:color .12s; flex-shrink:0; }
    .cb:hover,.cb:active { color:var(--txt); }
    .cb.on { color:var(--acc); }
    .playbtn { background:var(--acc); border:none; border-radius:50%; width:42px; height:42px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; flex-shrink:0; margin:0 2px; transition:background .1s,transform .08s; }
    .playbtn:hover { background:var(--acc2); }
    .playbtn:active { transform:scale(.92); }
    .volrow { display:flex; align-items:center; gap:6px; flex-shrink:0; margin-left:6px; }
    .volrow input { width:70px; }

    /* ── MODALS ── */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; display:flex; align-items:flex-end; justify-content:center; }
    .modal-bg.center { align-items:center; }
    .sheet { background:var(--card); border-radius:16px 16px 0 0; width:100%; max-width:480px; padding:16px 0 calc(16px + var(--safe-bottom)); }
    .sheet.dialog { border-radius:14px; padding:20px; max-width:320px; margin:16px; }
    .sheet-handle { width:36px; height:4px; background:var(--dim); border-radius:2px; margin:0 auto 14px; }
    .sheet-title { font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; padding:0 16px 8px; }
    .sheet-item { display:flex; align-items:center; gap:12px; padding:13px 16px; cursor:pointer; transition:background .1s; font-size:15px; }
    .sheet-item:hover,.sheet-item:active { background:var(--hover); }
    .sheet-item svg { flex-shrink:0; }
    .sheet-item.danger { color:var(--red); }
    .dialog-title { font-size:16px; font-weight:600; margin-bottom:6px; }
    .dialog-sub { font-size:13px; color:var(--muted); margin-bottom:16px; }
    .dialog-input { width:100%; background:var(--surf); border:1px solid var(--border); border-radius:9px; padding:10px 12px; color:var(--txt); font-size:14px; outline:none; margin-bottom:14px; }
    .dialog-input:focus { border-color:var(--acc); }
    .dialog-btns { display:flex; gap:8px; justify-content:flex-end; }
    .dialog-btn { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; }
    .dialog-btn.cancel { background:var(--hover); color:var(--muted); }
    .dialog-btn.confirm { background:var(--acc); color:#fff; }

    /* ── LOADING ── */
    #loading { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:200; }
    .spin { width:26px; height:26px; border:2px solid rgba(139,92,246,.2); border-top-color:var(--acc); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── NOTIF ── */
    #notif { position:fixed; bottom:calc(var(--player-h) + 12px); left:50%; transform:translateX(-50%); background:var(--card); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:8px 15px; font-size:13px; color:var(--txt); opacity:0; transition:opacity .2s; pointer-events:none; white-space:nowrap; z-index:50; }
    #notif.show { opacity:1; }

    /* ── CACHE INDICATOR ── */
    #cache-bar { position:fixed; top:var(--nav-h); left:0; right:0; height:2px; background:linear-gradient(90deg,var(--acc),#a78bfa); transform:scaleX(0); transform-origin:left; transition:transform .3s; z-index:20; }
    #cache-bar.show { transform:scaleX(1); }

    /* ── RESPONSIVE DESKTOP ── */
    @media (min-width:640px) {
      :root { --player-h: 80px; }
      #nav { padding:0 20px; gap:8px; }
      .tab { font-size:13px; padding:5px 13px; }
      #libinner { padding:8px 20px 20px; }
      .lib-toolbar { padding:10px 20px 6px; }
      .pl-header { padding:10px 20px 8px; }
      #plinner { padding:0 20px 20px; }
      .pld-header { padding:10px 20px; }
      #pldetailinner { padding:8px 20px 20px; }
      #v-import { padding:28px 24px; }
      .ctrlrow { gap:4px; }
      .cc { gap:4px; }
      .playbtn { width:44px; height:44px; }
      .volrow input { width:90px; }
      #player { padding:12px 24px calc(12px + var(--safe-bottom)); }
      .seekrow { margin-bottom:12px; }
      .nowplay { max-width:220px; }
    }

    @media (min-width:900px) {
      .nowplay { max-width:260px; }
      .volrow input { width:110px; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div style="width:40px;height:40px;background:var(--acc);border-radius:11px;display:flex;align-items:center;justify-content:center;">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
  </div>
  <div class="spin"></div>
  <p id="ldmsg" style="font-size:13px;color:var(--muted)">Chargement de votre bibliothèque...</p>
</div>

<div id="cache-bar"></div>

<div id="nav">
  <div class="logo">
    <div class="logo-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
    <span class="logo-text">Melo</span>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-lib"    onclick="showView('library')">Titres</button>
    <button class="tab"        id="tab-pl"     onclick="showView('playlists')">Playlists</button>
    <button class="tab"        id="tab-imp"    onclick="showView('import')">Importer</button>
  </div>
  <button class="imp-btn" onclick="showView('import')">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>+
  </button>
</div>

<div id="content">

  <!-- LIBRARY -->
  <div id="v-library">
    <div class="lib-toolbar">
      <div class="srchwrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="var(--muted)"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input id="srch" placeholder="Rechercher..." oninput="renderLib()">
      </div>
    </div>
    <div id="libinner"></div>
  </div>

  <!-- PLAYLISTS -->
  <div id="v-playlists" style="display:none">
    <div class="pl-header">
      <span class="pl-title">Mes playlists</span>
      <button class="pl-new-btn" onclick="newPlaylist()">+ Nouvelle</button>
    </div>
    <div id="plinner"></div>
  </div>

  <!-- PLAYLIST DETAIL -->
  <div id="v-pldetail">
    <div class="pld-header">
      <button class="back-btn" onclick="showView('playlists')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <span class="pld-name" id="pldetail-name"></span>
      <button class="pld-edit" id="pldetail-editbtn" onclick="editCurrentPlaylist()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--muted)"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      </button>
    </div>
    <div id="pldetailinner"></div>
  </div>

  <!-- IMPORT -->
  <div id="v-import" style="display:none">
    <div class="dropzone" id="dz">
      <div class="dz-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="var(--dim)"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg></div>
      <div style="text-align:center">
        <p class="dz-title">Glisser-déposer vos musiques</p>
        <p style="font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:6px">ou appuyer pour parcourir</p>
        <p style="font-size:11px;color:var(--dim);font-family:monospace">MP3 · WAV · FLAC · OGG · AAC · M4A</p>
      </div>
    </div>
    <div class="uplist" id="uplist"></div>
    <input id="filein" type="file" multiple accept="audio/*,.mp3,.wav,.ogg,.flac,.aac,.m4a,.opus" style="display:none">
  </div>

</div>

<!-- PLAYER -->
<div id="player">
  <div class="seekrow">
    <span class="ttime" id="pt" style="text-align:right">0:00</span>
    <div class="seekbar" id="sb"><div class="seekfill" id="sf" style="width:0%"></div></div>
    <span class="ttime" id="dt">0:00</span>
  </div>
  <div class="ctrlrow">
    <div class="nowplay" id="np"><p style="font-size:12px;color:var(--dim)">— rien en lecture</p></div>
    <div class="cc">
      <button class="cb" id="shufb" onclick="toggleShuffle()" title="Aléatoire">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>
      <button class="cb" onclick="goPrev()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="playbtn" onclick="togglePlay()">
        <svg id="pico" width="21" height="21" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="cb" onclick="goNext()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <button class="cb" id="repb" onclick="toggleRepeat()" style="position:relative" title="Répéter">
        <svg id="repico" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        <span id="repdot" style="display:none;position:absolute;top:5px;right:5px;width:4px;height:4px;border-radius:50%;background:var(--acc);"></span>
      </button>
    </div>
    <div class="volrow">
      <button class="cb" onclick="toggleMute()">
        <svg id="vico" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
      <input id="vslider" type="range" min="0" max="1" step="0.01" value="0.8" oninput="setVol(this.value)">
    </div>
  </div>
</div>

<div id="notif"></div>
<audio id="aud"></audio>

<script>
const API    = '/.netlify/functions/api';
const BUCKET = 'melo-music-2026';

/* ── STATE ── */
let tracks=[], playlists=[], cur=null, isPlaying=false;
let isShuffle=false, repeatMode=0, isMuted=false, volume=0.8;
let dlUrl='', dlToken='';
let currentView='library', currentPl=null;
let queueIds=null; /* null = tous les titres, sinon liste d'ids de la playlist active */

/* ── CACHE ── */
const blobCache = new Map();   /* id → blobUrl */
const cacheOrder = [];
const CACHE_MAX = 10;

const aud = document.getElementById('aud');
aud.volume = volume;

/* ── UTILS ── */
const fmt   = t => (!t||isNaN(t)) ? '0:00' : `${Math.floor(t/60)}:${String(Math.floor(t%60)).padStart(2,'0')}`;
const hue   = s => { let h=0; for(let c of s) h=((h<<5)-h+c.charCodeAt(0))|0; return Math.abs(h)%360; };
const abg   = h => `hsl(${h},40%,14%)`;
const afg   = h => `hsl(${h},65%,68%)`;
const esc   = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const note  = (sz,col) => `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="${col}"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`;
const genId = () => Date.now()+'_'+Math.random().toString(36).slice(2);

function notify(msg,ms=2600){
  const el=document.getElementById('notif');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),ms);
}
function ldmsg(m){ document.getElementById('ldmsg').textContent=m; }

function rawDlUrl(key){ return `${dlUrl}/file/${BUCKET}/${encodeURIComponent(key)}?Authorization=${encodeURIComponent(dlToken)}`; }

/* ── CACHE AUDIO ── */
function isCached(id){ return blobCache.has(id); }

function addToCache(id, blobUrl){
  if(blobCache.has(id)) return;
  if(cacheOrder.length >= CACHE_MAX){
    const old = cacheOrder.shift();
    const oldUrl = blobCache.get(old);
    if(oldUrl) URL.revokeObjectURL(oldUrl);
    blobCache.delete(old);
  }
  blobCache.set(id, blobUrl);
  cacheOrder.push(id);
}

/* Télécharge la chanson en arrière-plan 3s après le début de lecture */
function scheduleCacheDownload(track){
  if(isCached(track.id)) return;
  setTimeout(async () => {
    if(isCached(track.id)) return;
    try {
      showCacheBar();
      const r = await fetch(rawDlUrl(track.key));
      if(!r.ok) return;
      const blob = await r.blob();
      const blobUrl = URL.createObjectURL(blob);
      addToCache(track.id, blobUrl);
      hideCacheBar();
      renderLib(); /* met à jour le point vert */
    } catch(e){ hideCacheBar(); }
  }, 3000);
}

function showCacheBar(){ document.getElementById('cache-bar').classList.add('show'); }
function hideCacheBar(){ document.getElementById('cache-bar').classList.remove('show'); }

/* ── SAVE META ── */
async function saveMeta(){
  try {
    await fetch(`${API}?action=save-meta`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ tracks, playlists })
    });
  } catch(e){ console.error('saveMeta',e); }
}

/* ── VIEWS ── */
function showView(v){
  currentView = v;
  document.getElementById('v-library').style.display   = v==='library'   ? 'flex':'none';
  document.getElementById('v-playlists').style.display = v==='playlists' ? 'flex':'none';
  document.getElementById('v-pldetail').style.display  = v==='pldetail'  ? 'flex':'none';
  document.getElementById('v-import').style.display    = v==='import'    ? 'flex':'none';
  document.getElementById('tab-lib').classList.toggle('active', v==='library');
  document.getElementById('tab-pl').classList.toggle('active',  v==='playlists'||v==='pldetail');
  document.getElementById('tab-imp').classList.toggle('active', v==='import');
  if(v==='playlists') renderPlaylists();
  if(v==='library') renderLib();
}

/* ── LIBRARY ── */
function getQueue(){ return queueIds ? tracks.filter(t=>queueIds.includes(t.id)) : tracks; }

function renderLib(){
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const base = getQueue();
  const shown = q ? base.filter(t=>(t.name+t.artist).toLowerCase().includes(q)) : base;
  const el = document.getElementById('libinner');

  if(!tracks.length){
    el.innerHTML=`<div class="empty">
      <div class="empty-icon">${note(34,'var(--dim)')}</div>
      <div><p style="font-size:15px;color:var(--txt);font-weight:500;margin-bottom:4px">Bibliothèque vide</p><p style="font-size:13px">Importez vos fichiers audio pour commencer</p></div>
      <button class="cta" onclick="showView('import')">Importer de la musique</button>
    </div>`;
    return;
  }
  if(!shown.length){ el.innerHTML=`<p style="text-align:center;color:var(--muted);font-size:13px;padding:40px 0">Aucun résultat</p>`; return; }

  el.innerHTML = `<p class="lib-count">${shown.length} titre${shown.length>1?'s':''}`+
    (blobCache.size>0?` · <span style="color:var(--green);font-size:10px">●</span> ${blobCache.size} en cache`:'')+'</p>'+
    shown.map(t => {
      const ri=tracks.indexOf(t), isCur=ri===cur, h=t.hue||hue(t.name);
      const cached = isCached(t.id);
      const artInner = isCur&&isPlaying
        ? `<div class="eq on"><span style="height:7px"></span><span style="height:13px"></span><span style="height:9px"></span></div>`
        : note(17, afg(h));
      return `<div class="track-row${isCur?' active':''}" onclick="rowClick(event,${ri})">
        <div class="art" style="background:${abg(h)}">${artInner}${cached?'<div class="cached-dot"></div>':''}</div>
        <div class="tinfo"><p class="tname${isCur?' cur':''}">${esc(t.name)}</p><p class="tartist">${esc(t.artist)}</p></div>
        <div class="row-actions">
          <button class="row-btn" onclick="openTrackMenu(event,'${t.id}')" title="Options">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
          </button>
        </div>
      </div>`;
    }).join('');
}

function rowClick(e,idx){ if(!e.target.closest('.row-btn')) playAt(idx); }

/* ── TRACK MENU ── */
function openTrackMenu(e, trackId){
  e.stopPropagation();
  const t = tracks.find(x=>x.id===trackId); if(!t) return;
  const plList = playlists.map(pl=>`
    <div class="sheet-item" onclick="addToPlaylist('${trackId}','${pl.id}');closeModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--acc)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      ${esc(pl.name)}
    </div>`).join('');

  showModal(`<div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">${esc(t.name)}</div>
    ${plList.length ? '<p style="font-size:12px;color:var(--muted);padding:0 16px 4px">Ajouter à une playlist :</p>'+plList : ''}
    <div class="sheet-item" onclick="newPlaylistWithTrack('${trackId}');closeModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--muted)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Nouvelle playlist...
    </div>
    ${isCached(t.id)?`<div class="sheet-item" onclick="uncacheTrack('${trackId}');closeModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--muted)"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      Retirer du cache
    </div>`:''}
    <div class="sheet-item danger" onclick="deleteTrack('${trackId}');closeModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--red)"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      Supprimer
    </div>
  </div>`);
}

function uncacheTrack(id){
  const url = blobCache.get(id);
  if(url) URL.revokeObjectURL(url);
  blobCache.delete(id);
  const i = cacheOrder.indexOf(id);
  if(i>-1) cacheOrder.splice(i,1);
  renderLib(); notify('Retiré du cache');
}

async function deleteTrack(id){
  const t=tracks.find(x=>x.id===id); if(!t) return;
  const ti=tracks.indexOf(t);
  try{ await fetch(`${API}?action=delete&key=${encodeURIComponent(t.key)}&fileId=${encodeURIComponent(t.fileId||'')}`); }catch(_){}
  tracks=tracks.filter(x=>x.id!==id);
  playlists.forEach(pl=>{ pl.trackIds=pl.trackIds.filter(x=>x!==id); });
  uncacheTrack(id);
  await saveMeta();
  if(cur===ti){ cur=null; isPlaying=false; aud.pause(); aud.src=''; updateNP(); }
  else if(cur!==null&&ti<cur) cur--;
  renderLib(); notify('Piste supprimée ✓');
}

/* ── PLAYLISTS ── */
function renderPlaylists(){
  const el=document.getElementById('plinner');
  if(!playlists.length){
    el.innerHTML=`<div class="empty" style="padding-top:40px">
      <div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="var(--dim)"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg></div>
      <p style="font-size:14px;color:var(--txt);font-weight:500">Aucune playlist</p>
      <p style="font-size:12px">Créez votre première playlist</p>
      <button class="cta" onclick="newPlaylist()">Créer une playlist</button>
    </div>`;
    return;
  }
  el.innerHTML = playlists.map(pl=>{
    const cnt = pl.trackIds.length;
    const colors = pl.trackIds.slice(0,4).map(id=>{ const t=tracks.find(x=>x.id===id); return t?abg(t.hue||hue(t.name)):'var(--dim)'; });
    const artHtml = colors.length===0
      ? `<div class="pl-art-1">${note(22,'var(--dim)')}</div>`
      : colors.slice(0,4).map(c=>`<div style="background:${c}"></div>`).join('');
    return `<div class="pl-card" onclick="openPlaylist('${pl.id}')">
      <div class="pl-art" style="${colors.length<2?'grid-template-columns:1fr':''}">
        ${artHtml}
      </div>
      <div class="pl-info">
        <p class="pl-name">${esc(pl.name)}</p>
        <p class="pl-sub">${cnt} titre${cnt>1?'s':''}</p>
      </div>
      <div class="pl-actions">
        <button class="pl-btn" onclick="playPlaylist(event,'${pl.id}')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--acc)"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="pl-btn" onclick="openPlMenu(event,'${pl.id}')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--muted)"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function openPlaylist(id){
  currentPl = playlists.find(p=>p.id===id); if(!currentPl) return;
  document.getElementById('pldetail-name').textContent = currentPl.name;
  renderPlDetail();
  showView('pldetail');
}

function renderPlDetail(){
  const el=document.getElementById('pldetailinner');
  if(!currentPl){ el.innerHTML=''; return; }
  const plTracks = currentPl.trackIds.map(id=>tracks.find(t=>t.id===id)).filter(Boolean);
  if(!plTracks.length){
    el.innerHTML=`<p class="pl-empty">Cette playlist est vide.<br>Ajoutez des titres depuis la bibliothèque.</p>`;
    return;
  }
  el.innerHTML = plTracks.map((t,i)=>{
    const ri=tracks.indexOf(t), isCur=ri===cur, h=t.hue||hue(t.name);
    const cached=isCached(t.id);
    const artInner=isCur&&isPlaying
      ?`<div class="eq on"><span style="height:7px"></span><span style="height:13px"></span><span style="height:9px"></span></div>`
      :note(17,afg(h));
    return `<div class="track-row${isCur?' active':''}" onclick="playFromPlaylist('${currentPl.id}','${t.id}')">
      <div class="art" style="background:${abg(h)}">${artInner}${cached?'<div class="cached-dot"></div>':''}</div>
      <div class="tinfo"><p class="tname${isCur?' cur':''}">${esc(t.name)}</p><p class="tartist">${esc(t.artist)}</p></div>
      <div class="row-actions">
        <button class="row-btn" onclick="removeFromPlaylist(event,'${currentPl.id}','${t.id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function playFromPlaylist(plId, trackId){
  const pl=playlists.find(p=>p.id===plId); if(!pl) return;
  queueIds = pl.trackIds;
  const idx=tracks.findIndex(t=>t.id===trackId);
  if(idx>-1) playAt(idx);
}

function playPlaylist(e, plId){
  e.stopPropagation();
  const pl=playlists.find(p=>p.id===plId); if(!pl||!pl.trackIds.length) return;
  queueIds=pl.trackIds;
  const firstIdx=tracks.findIndex(t=>t.id===pl.trackIds[0]);
  if(firstIdx>-1) playAt(firstIdx);
}

function openPlMenu(e, id){
  e.stopPropagation();
  const pl=playlists.find(p=>p.id===id); if(!pl) return;
  showModal(`<div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">${esc(pl.name)}</div>
    <div class="sheet-item" onclick="renamePl('${id}');closeModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--muted)"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      Renommer
    </div>
    <div class="sheet-item danger" onclick="deletePl('${id}');closeModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--red)"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      Supprimer la playlist
    </div>
  </div>`);
}

function newPlaylist(){
  showDialog('Nouvelle playlist','Nom de la playlist','',name=>{
    if(!name.trim()) return;
    playlists.push({ id:genId(), name:name.trim(), trackIds:[] });
    saveMeta(); renderPlaylists(); notify('Playlist créée ✓');
  });
}

function newPlaylistWithTrack(trackId){
  showDialog('Nouvelle playlist','Nom de la playlist','',name=>{
    if(!name.trim()) return;
    const pl={ id:genId(), name:name.trim(), trackIds:[trackId] };
    playlists.push(pl);
    saveMeta(); renderPlaylists(); notify('Ajouté à "'+pl.name+'" ✓');
  });
}

function renamePl(id){
  const pl=playlists.find(p=>p.id===id); if(!pl) return;
  showDialog('Renommer','Nouveau nom',pl.name,name=>{
    if(!name.trim()) return;
    pl.name=name.trim();
    if(currentPl?.id===id) document.getElementById('pldetail-name').textContent=pl.name;
    saveMeta(); renderPlaylists(); notify('Renommée ✓');
  });
}

async function deletePl(id){
  playlists=playlists.filter(p=>p.id!==id);
  if(currentPl?.id===id){ currentPl=null; queueIds=null; }
  await saveMeta(); renderPlaylists(); notify('Playlist supprimée');
}

function editCurrentPlaylist(){ if(currentPl) renamePl(currentPl.id); }

function addToPlaylist(trackId, plId){
  const pl=playlists.find(p=>p.id===plId); if(!pl) return;
  if(pl.trackIds.includes(trackId)){ notify('Déjà dans cette playlist'); return; }
  pl.trackIds.push(trackId);
  saveMeta(); notify('Ajouté à "'+pl.name+'" ✓');
}

async function removeFromPlaylist(e, plId, trackId){
  e.stopPropagation();
  const pl=playlists.find(p=>p.id===plId); if(!pl) return;
  pl.trackIds=pl.trackIds.filter(x=>x!==trackId);
  await saveMeta(); renderPlDetail(); notify('Retiré de la playlist');
}

/* ── PLAYBACK ── */
function playAt(idx){
  const t=tracks[idx]; if(!t||!dlToken) return;
  cur=idx;
  if(isCached(t.id)){
    aud.src=blobCache.get(t.id);
  } else {
    aud.src=rawDlUrl(t.key);
    scheduleCacheDownload(t);
  }
  aud.load();
  aud.play().catch(e=>console.error('play',e));
  renderLib(); renderPlDetail(); updateNP();
}

function togglePlay(){
  if(cur===null) return;
  if(isPlaying){ aud.pause(); isPlaying=false; }
  else{ aud.play().catch(()=>{}); isPlaying=true; }
  updatePBtn(); renderLib(); renderPlDetail();
}

function getNextIdx(){
  const q = queueIds ? tracks.filter(t=>queueIds.includes(t.id)) : tracks;
  if(!q.length) return null;
  if(isShuffle){ let i; do{ i=Math.floor(Math.random()*q.length); }while(q.length>1&&tracks.indexOf(q[i])===cur); return tracks.indexOf(q[i]); }
  const ci=q.findIndex(t=>tracks.indexOf(t)===cur);
  return tracks.indexOf(q[(ci+1)%q.length]);
}

function getPrevIdx(){
  const q = queueIds ? tracks.filter(t=>queueIds.includes(t.id)) : tracks;
  if(!q.length) return null;
  const ci=q.findIndex(t=>tracks.indexOf(t)===cur);
  return tracks.indexOf(q[(ci-1+q.length)%q.length]);
}

function goNext(){ if(repeatMode===2){aud.currentTime=0;aud.play();return;} const i=getNextIdx(); if(i!==null) playAt(i); }
function goPrev(){ if(aud.currentTime>3){aud.currentTime=0;return;} const i=getPrevIdx(); if(i!==null) playAt(i); }
function toggleShuffle(){ isShuffle=!isShuffle; document.getElementById('shufb').classList.toggle('on',isShuffle); }
function toggleRepeat(){ repeatMode=(repeatMode+1)%3; document.getElementById('repb').classList.toggle('on',repeatMode>0); document.getElementById('repdot').style.display=repeatMode>0?'block':'none'; document.getElementById('repico').innerHTML=repeatMode===2?'<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/>':'<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>'; }
function setVol(v){ volume=parseFloat(v); isMuted=false; aud.volume=volume; updateVIco(); }
function toggleMute(){ isMuted=!isMuted; aud.volume=isMuted?0:volume; document.getElementById('vslider').value=isMuted?0:volume; updateVIco(); }

function updatePBtn(){ document.getElementById('pico').innerHTML=isPlaying?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>'; }
function updateNP(){
  updatePBtn();
  const t=cur!==null?tracks[cur]:null;
  const np=document.getElementById('np');
  if(t){ const h=t.hue||hue(t.name); np.innerHTML=`<div class="nowart" style="background:${abg(h)}">${note(15,afg(h))}</div><div class="nowinfo"><p class="nowname">${esc(t.name)}</p><p class="nowartist">${esc(t.artist)}</p></div>`; }
  else np.innerHTML='<p style="font-size:12px;color:var(--dim)">— rien en lecture</p>';
}

/* ── SEEKBAR ── */
document.getElementById('sb').addEventListener('click',e=>{
  if(!aud.duration) return;
  const r=e.currentTarget.getBoundingClientRect();
  aud.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*aud.duration;
});
aud.addEventListener('timeupdate',()=>{
  const p=aud.duration?(aud.currentTime/aud.duration)*100:0;
  document.getElementById('sf').style.width=p+'%';
  document.getElementById('pt').textContent=fmt(aud.currentTime);
  document.getElementById('dt').textContent=fmt(aud.duration);
});
aud.addEventListener('play', ()=>{ isPlaying=true; updatePBtn(); renderLib(); renderPlDetail(); });
aud.addEventListener('pause',()=>{ isPlaying=false; updatePBtn(); renderLib(); renderPlDetail(); });
aud.addEventListener('ended',goNext);

/* ── MODAL ── */
let modalEl=null;
function showModal(html){
  closeModal();
  modalEl=document.createElement('div');
  modalEl.className='modal-bg';
  modalEl.innerHTML=html;
  modalEl.addEventListener('click',e=>{ if(e.target===modalEl) closeModal(); });
  document.body.appendChild(modalEl);
}
function closeModal(){ if(modalEl){ modalEl.remove(); modalEl=null; } }

function showDialog(title,placeholder,value,onConfirm){
  showModal(`<div class="modal-bg center" style="position:static;display:flex;align-items:center;justify-content:center;width:100%">
    <div class="sheet dialog">
      <p class="dialog-title">${esc(title)}</p>
      <input class="dialog-input" id="dia-in" placeholder="${esc(placeholder)}" value="${esc(value)}" autofocus>
      <div class="dialog-btns">
        <button class="dialog-btn cancel" onclick="closeModal()">Annuler</button>
        <button class="dialog-btn confirm" id="dia-ok">Créer</button>
      </div>
    </div>
  </div>`);
  const inp=document.getElementById('dia-in');
  const btn=document.getElementById('dia-ok');
  if(inp) setTimeout(()=>inp.focus(),50);
  if(btn) btn.onclick=()=>{ onConfirm(inp?inp.value:''); closeModal(); };
  if(inp) inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ onConfirm(inp.value); closeModal(); } });
}

/* ── IMPORT ── */
const dz=document.getElementById('dz');
dz.addEventListener('click',()=>document.getElementById('filein').click());
dz.addEventListener('dragover',e=>{ e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{ e.preventDefault(); dz.classList.remove('drag'); handleFiles(e.dataTransfer.files); });
document.getElementById('filein').addEventListener('change',e=>handleFiles(e.target.files));

function handleFiles(files){
  const af=[...files].filter(f=>f.type.startsWith('audio/')||/\.(mp3|wav|ogg|flac|aac|m4a|opus)$/i.test(f.name));
  if(!af.length){ notify('Aucun fichier audio détecté'); return; }
  af.forEach(uploadFile);
}

async function uploadFile(file){
  const id  = genId();
  const ext = (file.name.match(/\.[^.]+$/)||['.mp3'])[0].toLowerCase();
  const key = 'tracks/'+id+ext;
  const name= file.name.replace(/\.[^.]+$/,'').replace(/[_\-]+/g,' ').trim();

  const ul=document.getElementById('uplist');
  const item=document.createElement('div'); item.className='upitem';
  item.innerHTML=`<div class="uphd"><span class="upname">${esc(name)}</span><span class="uppct" id="pct-${id}">0%</span></div><div class="upbg"><div class="upfill" id="bar-${id}" style="width:0%"></div></div>`;
  ul.prepend(item);
  const setP=p=>{ const pe=document.getElementById('pct-'+id),be=document.getElementById('bar-'+id); if(pe)pe.textContent=p+'%'; if(be)be.style.width=p+'%'; };

  try {
    const cr=await fetch(`${API}?action=upload-creds`);
    if(!cr.ok) throw new Error('Credentials indisponibles ('+cr.status+')');
    const creds=await cr.json();
    const buf=await file.arrayBuffer();
    const hash=await crypto.subtle.digest('SHA-1',buf);
    const sha1=Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');

    const fileId=await new Promise((resolve,reject)=>{
      const xhr=new XMLHttpRequest();
      xhr.open('POST',creds.uploadUrl);
      xhr.setRequestHeader('Authorization',creds.authorizationToken);
      xhr.setRequestHeader('X-Bz-File-Name',encodeURIComponent(key));
      xhr.setRequestHeader('Content-Type',file.type||'audio/mpeg');
      xhr.setRequestHeader('X-Bz-Content-Sha1',sha1);
      xhr.upload.onprogress=e=>{ if(e.lengthComputable) setP(Math.round(e.loaded/e.total*100)); };
      xhr.onload=()=>{ try{ const r=JSON.parse(xhr.responseText); if(xhr.status>=200&&xhr.status<300) resolve(r.fileId); else reject(new Error(`B2 ${xhr.status}: ${r.message||''}`)); }catch(e){ reject(new Error('Réponse invalide')); } };
      xhr.onerror=()=>reject(new Error('Erreur réseau'));
      xhr.send(new Blob([buf]));
    });

    item.querySelector('.uphd').innerHTML=`<span class="upname">${esc(name)}</span><span class="updone">✓ Uploadé</span>`;
    item.querySelector('.upbg').style.display='none';
    tracks.push({ id, key, name, artist:'Artiste inconnu', hue:hue(name), fileId });
    await saveMeta();
    renderLib();
    notify('✓ '+name+' ajouté');
  } catch(err){
    console.error('upload:',err);
    item.querySelector('.uphd').innerHTML=`<span class="upname">${esc(name)}</span><span class="uperr" title="${esc(err.message)}">✗ ${esc(err.message)}</span>`;
    item.querySelector('.upbg').style.display='none';
    notify('Erreur: '+err.message.slice(0,55));
  }
}

/* ── INIT ── */
async function init(){
  try {
    ldmsg('Chargement de votre bibliothèque...');
    const r=await fetch(`${API}?action=init`);
    if(!r.ok) throw new Error('Serveur indisponible ('+r.status+')');
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    /* Compatibilité : ancien format = tableau de tracks */
    if(Array.isArray(d.tracks)){
      tracks=d.tracks; playlists=d.playlists||[];
    } else {
      tracks=d.tracks||[]; playlists=d.playlists||[];
    }
    dlUrl=d.downloadUrl; dlToken=d.downloadToken;
    document.getElementById('loading').style.display='none';
    renderLib();
  } catch(e){
    console.error('init',e);
    document.getElementById('ldmsg').textContent='❌ '+e.message;
    document.getElementById('ldmsg').style.color='var(--red)';
    document.querySelector('.spin').style.display='none';
  }
}

init();
</script>
